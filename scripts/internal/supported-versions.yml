# Specrew supported-versions declaration (module-side, maintainer-managed).
#
# Source of truth for the `min` and `max_tested` versions Specrew supports
# against its dependencies. Read by scripts/internal/version-check.ps1 and
# scripts/specrew-update.ps1 to compute four-state status for `specrew update --info`.
#
# Update `max_tested` whenever a new Specrew release validates against a higher
# upstream dependency version (per Rule 15 version-management discipline).
#
# Schema:
#   schema: v1
#   <platform>:
#     min:         <semver>   # absolute floor; Specrew refuses below this
#     max_tested:  <semver>   # latest version Specrew validated against this release
#     notes:       <string>   # optional; surfaces in `--info` (e.g. "X.Y.Z released; adoption pending")

schema: v1

speckit:
  min: "0.12.9"
  max_tested: "0.12.9"
  notes: "Single tested pin (F-198 I2 decision). BREAKING at 0.10.0: the --ai/--ai-commands-dir/--ai-skills flags were removed; init uses --integration <key>. Validated 2026-07-10 (F-198 T001 probe on v0.12.9, commit 80ac47e2): --script ps and --ignore-agent-tools survive; multi-integration installs work behind `integration install <key> --force` (default integration preserved); git extension stays un-installed (its auto-commit conflicts with Specrew boundary-commit discipline); agent-context extension fully opt-in and unused; specrew-speckit extension.yml hooks schema loads (12 commands / 4 hooks, Enabled)."

squad:
  min: "0.11.0"
  max_tested: "0.11.0"
  notes: "Single tested pin (F-198 I2). No breaking release notes 0.9.1->0.11.0 (v0.11.0 adds 'squad registry'; renames '.NET Aspire'->'Aspire' in help text). Probe + .squad layout suites validated 2026-07-10 (F-198 T003)."
