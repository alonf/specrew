# Specrew supported-versions declaration (module-side, maintainer-managed).
#
# Source of truth for the `min` and `max_tested` versions Specrew supports
# against its dependencies. Read by scripts/internal/version-check.ps1 and
# scripts/specrew-update.ps1 to compute four-state status for `specrew update --info`.
#
# Update `max_tested` whenever a new Specrew release validates against a higher
# upstream dependency version (per Rule 15 version-management discipline).
#
# Schema:
#   schema: v1
#   <platform>:
#     min:         <semver>   # absolute floor; Specrew refuses below this
#     max_tested:  <semver>   # latest version Specrew validated against this release
#     notes:       <string>   # optional; surfaces in `--info` (e.g. "X.Y.Z released; adoption pending")

schema: v1

speckit:
  min: "0.8.4"
  max_tested: "0.9.0"
  notes: "0.9.0 extracted agent-context updates into a bundled agent-context extension (after_specify/after_plan hooks) and changed the .specify/extensions.yml installed: list to bare strings. Validated 2026-06-02 (feature 090, spike-speckit-090): Specrew before-plan/after-tasks/before-implement hooks coexist via `specify extension add`; existing object-format projects + stale init-options.json tolerated; agent-context marker upsert runs. Shipped alongside: format-aware Ensure-ExtensionRegistration (deploy-speckit-extension.ps1) so `specrew update` no longer corrupts 0.9.0 string-format installed: lists. Upstream compatibility fallback deprecated (removal in 0.12.0) does not affect Specrew. 0.8.14-0.8.18 all additive."

squad:
  min: "0.9.1"
  max_tested: "0.9.4"
  notes: ""
