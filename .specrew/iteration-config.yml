# Iteration Configuration
# Schema: v1
# Controls effort measurement and iteration behavior for Specrew

# Effort measurement unit
# Specrew v1 uses story points; future versions may support other units
effort_unit: "story_points"

# Maximum effort units per iteration (capacity)
# BASELINE: 20 story points. The 20 SP cap is intentional — it scopes AI agent
# context and keeps iteration plans within a single-session execution window.
# When a planned slice exceeds 20, the right move is to SPLIT the iteration,
# not raise the cap. F-049 Iteration 003 was briefly raised to 25 for a 23.45 SP
# load; that bump was reverted at F-049 stable closeout (2026-05-30) and the
# corrected position is recorded for the team. Closed iterations are protected
# by the grandfather rule (Proposal 144 / PR #1153) so reverting the cap does
# not retroactively fail historical plans.
#
# OVERRIDE (2026-06-13, F-174 iteration 011, verdict f174-i011-plan-tasks-approved):
# raised 20 -> 22 by a human-approved plan verdict to keep the DF-3/4/5/7
# boundary-authoring + verdict-integrity cluster one coherent iteration. The
# maintainer made this call INFORMED of the split-not-raise position + the F-049
# reverted precedent above. This is PROJECT-GLOBAL and REVERSIBLE: lower back to
# 20 after iteration 011 closes (closed iterations are grandfathered).
#
# OVERRIDE 2 (2026-06-14, F-174 iteration 011, decision f174-i011-hook-deploy-hardening):
# raised 22 -> 32 for the maintainer-pre-approved hook install/discovery hardening
# (FR-028, T010-T012) folded mid-implement into iter-011 ("I already consider the extra
# sp ... and approved"). Same REVERSIBLE + grandfathered terms: the
# f174-i011-cap-revert-obligation restores this to the global default 20 at closeout.
#
# REVERTED 2026-06-14 at the F-174 iter-011 + iter-007 closeout (obligation
# f174-i011-cap-revert-obligation DISCHARGED): restored to the global default 20.
# iterations 010/011 (historical plan cap 32) are protected by the grandfather rule
# (past-implementation status -> validated against their own plan capacity, not the
# global default); iter-007 (plan cap 20) matches the global default again.
#
# OVERRIDE 3 (2026-06-17, F-184 iteration 001, user completeness directive):
# raised 20 -> 26 so the known F-183 Antigravity completion work landed in one
# coherent slice after the maintainer explicitly rejected another partial feature
# return.
#
# REVERTED 2026-06-17 at F-184 retro: restored to the global default 20. The
# F-184 iteration plan remains 26/26 as historical truth under the temporary
# override and is protected by closed/past-implementation capacity validation.
capacity_per_iteration: 20

# Iteration bounding strategy
# - scope: Iteration completes when planned tasks are done (time varies)
# - time: Iteration has fixed time limit (scope varies)
iteration_bounding: "scope"

# Time limit (hours) if iteration_bounding = "time"
# null for scope-bounded iterations
time_limit_hours: null

# Overcommit threshold (ratio)
# Warns if planned effort exceeds capacity * threshold
# 1.0 = no overcommit allowed, 1.1 = 10% overcommit tolerated
overcommit_threshold: 1.0

# Calibration tracking
# If true, retrospectives include velocity analysis and capacity suggestions
calibration_enabled: true

# Defer strategy for overcommitted iterations
# - manual: Planner must manually select tasks to defer
# - lowest_priority: Automatically defer lowest-priority tasks
defer_strategy: "manual"

# Reviewer closeout defaults
reviewer:
  # Enforce mandatory closeout packets only for iterations at or after this slice.
  closeout_packet_required_since_iteration: "009"
  test_path_globs:
    - "**/tests/**"
    - "**/test/**"
    - "**/*test*.*"
    - "**/*spec*.*"
  sensitive_data_patterns:
    - "auth*"
    - "secret*"
    - "credential*"
    - "token*"
    - "key*"
    - "crypto*"
  test_commands:
    - "& '.\\tests\\integration\\quality-profile-foundation.ps1'"
    - "& '.\\tests\\integration\\mechanical-findings-contract.ps1'"
    - "& '.\\tests\\integration\\quality-evidence-governance.ps1'"
    - "& '.\\tests\\integration\\process-quality-scorer.ps1'"
    - "& '.\\tests\\integration\\process-quality-report.ps1'"
  coverage:
    tool: ""
    kind: "qualitative"
  skip_test_execution_at_close: false
  vulnerability_scanner:
    auto_detect: true
    command: ""
    candidates:
      - "npm audit --json"
      - "dotnet list package --vulnerable"
      - "pip-audit --format json"
      - "cargo audit --json"
      - "govulncheck -json ./..."
  baseline_ref: "iteration-baseline"
  diagram_format: "mermaid"
  hotspot_thresholds:
    file_changed_lines: 250
    function_changed_lines: 100
  diagram_thresholds:
    structure:
      min_modules_touched: 3
      min_inter_module_edges: 2
    flow:
      min_entrypoints_changed: 1
      min_modules_in_flow: 2

