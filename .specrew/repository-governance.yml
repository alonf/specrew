# .specrew/repository-governance.yml — Specrew's OWN branch governance (dogfood, FR-013/SC-007/SC-014).
#
# Records Specrew's ACTUAL posture as of 2026-06-11: `main` requires pull requests, applies to admins,
# and blocks force-pushes/deletions (the interim mitigation that triggered Proposal 182). Authored by
# the DevOps lens; validated against repository-governance.schema.json. SC-014: applying the updated
# lens to Specrew's own repo surfaces NO conflict — this capture matches the real protection.

repository_governance:
  provider: github
  branch_model:
    style: trunk
    release_truth_branch: main
    branches:
      - name: main
        role: release-truth
        protected: true
        require_pull_request: true
        required_checks: [Lint, Deterministic, Contract, prepublish-harness, tests]
        allow_force_pushes: false
        allow_deletions: false
    promotion_path: "feature/* -> main"
  review_gate:
    human_review:
      required_approvals: 1
      require_comment_resolution: true
    automated_review:
      enabled: true                 # Specrew uses Copilot PR review (opt-in, as the lens suggests on GitHub)
      provider_suggestion: copilot
    merge_requires: [human_review]
  apply_to_admins: true
  bypass_actors: []
  enforcement_mode: branch-protection

multi_repo:
  mode: single-repo
  orchestration_repo: null
  participant_repos: []
  merge_coordination: independent
  release_coordination: independent
