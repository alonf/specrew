# Specrew Spec Kit Extension
# Schema version for Spec Kit extensions
schema_version: "1.0"

# Extension metadata
name: "specrew-speckit"
version: "0.1.0-dev"
description: "Spec Kit extension providing governance artifacts, templates, and validation for Specrew"

# Minimum platform versions required
requires:
  speckit: ">=0.7.3"

# Extension type
type: "governance"

# Hooks directory (relative to this file)
hooks_dir: "hooks"

# Templates directory
templates_dir: "templates"

# Scripts directory
scripts_dir: "scripts"

# Feature flags and configuration
config:
  # Governance mode (standard = default Specrew workflow)
  governance_mode: "standard"
  
  # Drift detection configuration
  drift_detection:
    enabled: true
    # batch = run at Review/Demo ceremony; realtime = post-task hook (when available)
    mode: "batch"
  
  # Capacity and effort defaults
  capacity:
    default_unit: "story_points"
    default_per_iteration: 20
    overcommit_threshold: 1.0
  
  # Traceability enforcement
  traceability:
    require_fr_mapping: true
    require_us_mapping: true
    orphan_tasks_allowed: false
  
  # Version constraints
  versions:
    min_speckit: "0.7.3"
    min_squad: "0.9.1"
