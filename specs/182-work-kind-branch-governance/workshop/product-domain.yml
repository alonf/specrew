schema_version: "1.0"
depth: standard
depth_reason: >-
  Specrew is a known product and the trigger (Feature 177's release/closeout
  mismatch) is well-documented, so most product context is known. But this is a
  consequential change to lifecycle SHAPE (new first-class work kinds + a branch-
  governance decision area in the DevOps lens), not a tiny utility, so it earns
  current-workaround, success-metrics, and alternatives — hence Standard rather
  than Light or Deep.
context_scope: feature_standalone
product_id: null
product_context_ref: null

areas:
  users_customers_stakeholders:
    primary_user: "The Specrew-driven developer (human + Crew) deciding 'what kind of change is this, and what lifecycle do I follow'."
    operator: "The lifecycle phases + CI that consume the work-kind declaration and enforce closeout/branch policy."
    buyer_maintainer: "Alon (maintainer) — sets the default PR-backed branch-governance posture."
    harmed_if_bad: "Maintainers of protected-main repos who get blocked or mis-routed; anyone misled by over-claimed enforcement; downstream CI maintainers inheriting brittle work-kind checks."
  pain_jobs_workaround:
    pain: "Specrew treats feature delivery, release validation, docs-only changes, and DevOps/CI changes as ONE lifecycle shape. Post-merge release/CI/docs findings have nowhere to go except reopening a merged feature (unsafe on a protected main); trivial non-feature changes carry full-feature ceremony."
    current_workaround: "Hold a feature open past merge to capture release/beta learning (the Feature 177 anti-pattern), or push small fixes informally."
    cost_of_nothing: "Lifecycle truth gets corrupted by post-merge edits to merged features; protected-main repositories cannot follow the model; contributors over- or under-process changes."
  existing_system_context:
    relationship: "Extension of the existing design-lens system (the DevOps & Operations lens) plus the lifecycle / validator / CI surface. Not a new product."
    new_surface: "A work-kind taxonomy + lightweight docs-only/devops lifecycle surfaces + a repository-governance decision area in the DevOps lens (configurable branch_model + review_gate) + a PROVIDER-NEUTRAL CI work-kind validator + a pluggable ProviderAdapter (GitHub reference + generic/unknown fallback + on-the-fly read-only adapter synthesis) + honest capability detection + forge-neutralization of all downstream-governing surfaces."
  constraints:
    - "main is already protected on Specrew's repo as of 2026-06-11 (PR-required, applies to admins, no force-push/deletion) — interim mitigation; this feature defines the durable methodology + automation."
    - "Multi-host: methodology surfaces (lens md, lifecycle templates) deploy across the 5 hosts."
    - "Honest enforcement: MUST NOT over-claim runtime enforcement; partial enforcement labeled phased/deferred truthfully (maintainer rule)."
    - "GitHub-first: provider/plan/visibility determine which enforcement mechanism is actually available; a provider capability model abstracts other providers later."
    - "This feature is delivered as a normal software-feature until it introduces the work kinds it defines, then dogfoods them (maintainer rule)."
    - "Proposals 174 (boundary-variance disclosure) and 178 (verification-strategy lens) stay follow-ups unless a very small supporting slice is strictly required."
  outcomes_success_metrics:
    lifecycle_truth: "Lifecycle truth survives merge: a post-merge finding creates a NEW PR-backed work item and a separate release-validation record, never a reopened merged feature."
    governance_capture: "The DevOps lens captures the repository-governance decisions with honest capability reporting (no enforcement promise the repo cannot keep)."
    leading_indicator: "In a dogfood, Specrew's own repo carries main PR-protection + a declared work kind for this feature, and the docs-only/devops lightweight lifecycles are actually usable end-to-end to a PR-ready closeout."
  mvp_nongoals_vision:
    mvp: "The full Proposal 182, WORKSHOP-EXPANDED across THREE iterations (~16-24 SP): work-kind taxonomy (software-feature/bug-bash/docs-only/devops) + docs-only/devops lifecycle surfaces + DevOps-lens repository-governance with a CONFIGURABLE branch_model (user-named branches + trunk/integration/gitflow) + review_gate + multi-repo questions + the feature-closeout-vs-release-validation invariant + a PROVIDER-NEUTRAL core with a pluggable ProviderAdapter (GitHub reference adapter + generic/unknown fallback + ON-THE-FLY READ-ONLY adapter synthesis for other forges) + a provider-neutral CI work-kind validator + honest capability detection + brownfield adapt-or-change + forge-neutralization of all downstream-governing surfaces. Iter 1 = methodology + adapter contract/fallback + audit/inventory + brownfield content; Iter 2 = runtime validator + capability detection + synthesis + dogfood; Iter 3 = forge-neutralization decouple migration."
    non_goals:
      - "Shipping pre-built GitLab/Azure/Bitbucket adapters in Specrew (GitHub is the only shipped reference adapter + a generic fallback; other forges are synthesized on the fly, read-only by default)."
      - "Enforcing a full ruleset policy as runtime automation in v1 (phased/deferred where partial; the validator defaults to advisory)."
      - "Rewriting historical feature artifacts (corrections are small new PRs, not retroactive edits)."
      - "Creating a release for docs-only changes."
      - "Changing Specrew's OWN use of GitHub for its own development (only downstream-governing surfaces are forge-neutralized)."
      - "Proposals 174 and 178 (stay follow-ups)."
    vision: "The model is provider-neutral by construction; on-the-fly read-only adapter synthesis covers non-GitHub forges in V1 and human-verified adapters can unlock apply_protection; richer CI enforcement (changed-file classification, required-checks wiring) graduates from advisory to blocking as confidence grows."
    v1_failure_even_if_it_works: "It over-claims enforcement it cannot actually deliver (CI-only masquerading as branch protection), or it blocks legitimate/emergency work with no audited bypass path."
  alternatives_differentiation:
    alternative_a: "Status quo — one lifecycle shape for everything: the exact cause of the Feature 177 release/closeout confusion."
    alternative_b: "CI-only enforcement (no branch protection): false confidence — CI cannot prevent a direct push after it happens."
    alternative_c: "Branch protection only (no work-kind semantics): stops direct pushes but does not right-size lifecycles or separate closeout from release validation."
    differentiation: "Combine REAL branch protection (the actual enforcement layer) + work-kind semantics (the lifecycle layer) + HONEST capability reporting (degrade to ci-only/manual when protection is unavailable). Must beat status-quo on lifecycle-truth integrity and protected-repo usability."
  adoption_rollout_change_impact:
    rollout: "Ships beta-first (universal mandate), dogfooded on Specrew's own repo. Adoption = work kinds + the DevOps-lens governance questions join the standard workshop/lifecycle flow."
    change_impact: "Developers now declare a work kind per change; mitigated by sensible defaults (software-feature default), the lightweight docs-only/devops kinds, and honest phased enforcement so nothing hard-blocks before it is real."

