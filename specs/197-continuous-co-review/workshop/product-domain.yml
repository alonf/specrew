schema_version: v1
depth: standard
depth_reason: >-
  Proposal 197 is a normal Specrew product feature with host-neutral behavior,
  lifecycle trust implications, and active sibling-branch coordination risk. It
  is not a brand-new product or regulated domain, so Deep discovery is not
  warranted, but Light would miss the product risk around F-184 overlap and
  reviewer trust.
context_scope: feature_standalone
product_id: specrew
product_context_ref: null
areas:
  users_stakeholders: >-
    Primary users are Specrew implementers, Spec Stewards, reviewers, and
    maintainers working through lifecycle checkpoints. The maintainer / chief
    architect remains the final reviewer. Downstream Specrew project teams
    benefit indirectly because fewer design violations reach late review.
  pain_job: >-
    Specrew's structured Proposal 145 review runs at review-signoff, after
    design drift and abstraction leaks are already expensive. AI coding agents
    can forget or deprioritize design rules mid-flow, so the job is to re-check
    each checkpoint against the design contract while the fix is still cheap.
  current_workaround: >-
    Current mitigation is late structured review plus human review. That remains
    the final backstop but does not catch edit-boundary drift early.
  existing_system_context: >-
    This is an extension to Specrew's existing Spec Kit / Squad lifecycle in the
    Specrew repository. The first slice must stay additive and avoid active
    F-184 host-runtime, hook, provider, registry, refocus, and shared governance
    surfaces.
  constraints: >-
    Run against the worktree Specrew module, never run `specrew update` in this
    repository, use markdownlint before every commit, preserve PR-protected main,
    keep the first slice new-files-only, and treat
    `C:\Dev\183-stability-quality-bundle` as read-only sibling context until the
    branches are merged.
  outcomes_success_metrics: >-
    Blocking design violations stop checkpoint advancement, advisory and nit
    findings remain auditable without blocking, blackboard records preserve
    finding/disposition/rationale/escalation state, and deterministic fixtures
    prove validator behavior before any live host-hook integration claim.
  mvp: >-
    Iteration 001 delivers the host-neutral spine: reviewer contract, forced
    findings JSON schema, git-diff change-set, blackboard review-thread
    protocol, standalone blocking gate, orchestrator checkpoint loop trigger,
    headless-floor adapters, and rung 2b fresh-context reviewer.
  non_goals: >-
    Do not implement rung 1, PostToolUse hook triggers, Proposal 139 heavy
    foundation, or edits to F-184-protected host-runtime/hook/provider/registry
    surfaces in the first iteration.
  alternatives_differentiation: >-
    The main alternative is relying on late Proposal 145 review only. Another
    alternative is a host-specific hook solution, rejected for this slice because
    host neutrality and a stable contract come first.
  adoption_rollout: >-
    Dogfood the rung 2b contract in Specrew first, keep Proposal 145 as the final
    aggregate backstop, and re-check / merge with F-184 before integrating
    anything that depends on the rewritten host-runtime or provider surfaces.
