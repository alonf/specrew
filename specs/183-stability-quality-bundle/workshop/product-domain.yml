schema_version: "1.0"
depth: light
depth_reason: >-
  Specrew is a known product and this feature is a narrow stability/quality bundle
  following Feature 174's hook-driven bootstrap release. The work fixes named defects
  and small follow-up improvements rather than introducing a new product, workflow, or
  market-facing capability, so Light depth is sufficient.
context_scope: feature_standalone
product_id: null
product_context_ref: null

areas:
  users_customers_stakeholders:
    primary_user: "Specrew maintainer and dogfood users launching hook-capable hosts such as Claude and Codex."
    operator: "Specrew lifecycle, hook dispatcher/provider, closeout sync, and local test surfaces."
    harmed_if_bad: "Reviewers and downstream users harmed by missing bootstrap guidance, false lifecycle state, stale closeout evidence, or untrustworthy local green-baseline tests."
  pain_jobs_workaround:
    pain: "The current 0.37.0-beta1 dogfood path has focused defects that can undermine SessionStart bootstrap delivery, boundary/closeout trust, and local test stability."
    current_workaround: "Manual vigilance during dogfood, ad hoc diagnosis of hook-output drops, and tolerance of known local-test reds."
    cost_of_nothing: "Stable 0.37.0 could promote with bootstrap delivery and closeout/test trust gaps still present."
  existing_system_context:
    relationship: "Stability extension to the existing Specrew PowerShell module, hook providers, closeout sync logic, deployed .specify mirror, and tests."
    not_new_product: "No new standalone product or workflow; this is a focused quality bundle after Feature 174."
  constraints:
    - "software-feature lifecycle with bug-bash conduct per item"
    - "capacity cap remains 20 story points"
    - "source hook/provider changes must be mirrored into the deployed .specify extension"
    - "dogfood runtime is the dev tree via SPECREW_MODULE_PATH"
    - "no global module upgrade or PSGallery dependency during the feature"
  outcomes_success_metrics:
    leading_indicator: "The next appropriate 0.37.0-beta<N> ships with the in-scope FRs fixed and real-host validation passes before stable promotion."
    trust_outcome: "SessionStart bootstrap delivery, hook-provider fallback, session-id state, closeout classification, and local test hygiene become reviewable and less fragile."
  mvp_nongoals_vision:
    mvp: "Deliver Proposal 179, Proposal 180, Issue #2446, DirectiveDeliveryCap hermeticity, Issue #1627 sub-parts a/b/c, Issue #1761 reds #2/#3, and Antigravity hook support after maintainer-provided upstream evidence showed Antigravity now documents first-class hooks while Specrew still excludes Antigravity from hook provisioning; ship the next appropriate 0.37.0-beta<N> then validate/promote."
    non_goals:
      - "Proposal 191 payload-size optimization spike and durable reduction"
      - "Proposal 165 / Issue #2081 Claude workshop picker/render residual"
      - "Proposal 168 Claude boundary-packet Stop hook"
      - "Issue #78 Squad hardening-gate handoff"
      - "Proposal 159 Tier 2 optional self-update"
      - "Proposal 123 verdict-history atomic single-write refactor"
      - "Issue #1761 red #1 wording/design row for feature-closeout SDLC handoff"

statements:
  - text: "The primary users are the Specrew maintainer and dogfood users launching hook-capable hosts."
    area: users_customers_stakeholders
    evidence: assumed
  - text: "The feature targets named defects in SessionStart bootstrap delivery, provider fallback, session-id state, closeout classification, and local test hygiene."
    area: pain_jobs_workaround
    evidence: known
  - text: "This is a stability extension to existing Specrew runtime and lifecycle surfaces, not a new product."
    area: existing_system_context
    evidence: known
  - text: "The feature capacity cap is 20 story points."
    area: constraints
    evidence: known
  - text: "Dogfood runtime uses the dev tree via SPECREW_MODULE_PATH and avoids a global module upgrade or PSGallery dependency."
    area: constraints
    evidence: known
  - text: "The MVP is the intake FR set plus the Antigravity hook-support amendment, followed by next-beta real-host validation and stable promotion only after validation passes."
    area: mvp_nongoals_vision
    evidence: known
  - text: "Antigravity hook support is added to scope because upstream Antigravity now documents hooks while current Specrew registry/deploy tests still exclude Antigravity from hook provisioning."
    area: mvp_nongoals_vision
    evidence: known
  - text: "Proposal 191, Proposal 165 / Issue #2081, Proposal 168, Issue #78, Proposal 159 Tier 2, Proposal 123, and Issue #1761 red #1 are out of scope for this focused bundle."
    area: mvp_nongoals_vision
    evidence: known

skipped:
  - area: alternatives_competitors
    reason: "Light depth selected; this is an internal stability bundle against known defects, not a product-positioning decision."
  - area: adoption_rollout_change_impact
    reason: "Rollout is the existing beta-before-stable release path; no new adoption workflow is introduced."
follow_up_research: []

confirmation: human-confirmed
confirmation_scope: lens-question
