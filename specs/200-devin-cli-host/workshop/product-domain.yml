schema_version: "1.0"
depth: "standard"
depth_reason: "Feature 200 extends a mature host-package architecture, but it crosses package generation, manifest/schema migration, lifecycle hooks, and real-host behavior. Devin CLI is volatile and transcript acquisition is uncertain enough that a light pass would hide a load-bearing feasibility gap."
context_scope: "feature_standalone"
product_id: null
product_context_ref: null
areas:
  users_stakeholders: "Specrew maintainers adding and validating hosts; developers running Specrew from Devin CLI; future host-package authors relying on the folder-only extension contract. Incorrect behavior harms operators through missed lifecycle gates, incomplete handovers, package/install drift, or regressions on existing hosts."
  pain_job: "Adding a host still requires shared-core enum edits, hand-maintained package entries, and coordinator-tier literals. The current workaround is to edit shared files and preserve firewall exceptions, weakening the open/closed claim and making every new host a regression risk."
  current_workaround: "Host authors add package files but also patch shared validation, packaging, and coordinator eligibility surfaces. Transcript support may require parser edits, which are explicitly deferred while Feature 197 owns the shared accessor."
  existing_system: "The registry, five-function host contract, hook bindings, instruction deployment, Crew-runtime deployment, supported-version declaration, and coupling firewall already provide most of the extension mechanism. Feature 200 extends and proves that mechanism rather than replacing it."
  constraints: "Deliver Slices A, C, and D now. Do not modify scripts/internal/bootstrap/ConversationCaptureAccessor.ps1. Defer Slice B transcript-turn-shape extraction until Feature 197 merges. Host-specific changes belong only under hosts/devin/; edits elsewhere must be generic and contain no hand-authored Devin/Windsurf literals except generated artifacts and the maintained supported-version declaration. The firewall allow-list must shrink. Existing five hosts must remain compatible."
  outcomes: "Devin is discoverable, launchable, hook-capable, instruction-aware, Crew-runtime capable, and coordinator-eligible through the host contract. Three validation exceptions and two coordinator exceptions are retired. Host package FileList entries are generated deterministically. The firewall permanently enforces host-addition purity. Real-host SessionStart, boundary-stop, and handover behavior are evidenced according to the transcript spike outcome."
  mvp: "Registry-driven validation; generated host-package FileList entries and parity coverage; a permanent purity assertion; hosts/devin/ manifest, five handlers, and coordinator rules; coordinator-eligibility manifest field plus iteration-config.yml migration; pinned tested-build declaration for devin 2026.7.23; and an early empirical Stop-payload spike that decides whether full handover ships now or is deferred."
  out_of_scope: "Slice B transcript-turn-shape contract work; edits to ConversationCaptureAccessor.ps1; Devin Desktop/Cascade integration; legacy Windsurf/Cascade paths; unrelated Proposal 198 work beyond composing with existing generation/parity mechanisms; a new transcript parser shape before Feature 197 merges."
  alternatives: "A quick host-specific branch in shared core is rejected. The selected differentiation is structural proof: an ordinary future host is added by a package folder, while genuinely new capability dimensions extend the contract generically. For handover, prefer live event payload, then in-package normalization to an existing parser shape, then honest degradation and deferral."
  adoption_rollout: "Treat devin 2026.7.23 as a pinned tested-build identifier using date-style versioning, not as assumed release chronology. Keep the host experimental until real-host validation passes, then promote it to supported. Never anchor implementation to Windsurf/Cascade product paths."
statements:
  - text: "The remaining shared validation, packaging, and coordinator-tier literals prevent the current host contract from proving folder-only extension."
    area: "pain_job"
    evidence: "known"
  - text: "Feature 197 owns ConversationCaptureAccessor.ps1, so Feature 200 must not edit it and Slice B is deferred."
    area: "constraints"
    evidence: "known"
  - text: "The installed test binary identifies itself as devin 2026.7.23 (3bd47f77); this is a pinned tested-build identifier even though its date-style version is later than the session date."
    area: "constraints"
    evidence: "known"
  - text: "The live Devin CLI supports -p/--print, --permission-mode, --continue, --resume, and --export."
    area: "existing_system"
    evidence: "known"
  - text: "Official Devin documentation confirms .devin/hooks.v1.json, Claude-compatible lifecycle events, DEVIN_PROJECT_DIR, AGENTS.md, .devin/agents/, and ATIF export."
    area: "existing_system"
    evidence: "known"
  - text: "Official documentation describes the Stop payload with stop_hook_active but does not document last_assistant_message; Tier-3 must therefore be tested empirically rather than assumed."
    area: "constraints"
    evidence: "known"
  - text: "The empirical Devin Stop-payload spike selected outcome 2: the live Stop payload contains only hook_event_name and stop_hook_active, while --export writes ATIF before Stop and a Devin-local normalization to an existing JSONL shape is consumed by the unchanged parser."
    area: "mvp"
    evidence: "known"
  - text: "The live Devin Stop payload does not carry an assistant-message field, so the existing Tier-3 event-payload fallback cannot provide Devin handover on tested build 2026.7.23."
    area: "mvp"
    evidence: "known"
  - text: "ATIF export can be normalized inside hosts/devin/ to the existing Claude-like JSONL turn shape; the unchanged parser captured the synthetic user and assistant canary turns."
    area: "mvp"
    evidence: "known"
  - text: "If handover needs a genuinely new parser shape, full transcript handover is deferred until Slice B after Feature 197; Devin ships with explicitly degraded handover rather than forcing a shared-parser edit."
    area: "out_of_scope"
    evidence: "known"
