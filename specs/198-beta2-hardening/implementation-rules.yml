schema_version: "1.0"
context_scope: "feature_standalone"
resolved_stack: "powershell-markdown-yaml-json"
selections:
  - id: "code-rule.intent-revealing-names"
    checked: true
  - id: "code-rule.short-functions"
    checked: true
  - id: "code-rule.avoid-deep-nesting"
    checked: true
  - id: "code-rule.dependency-injection"
    checked: true
    decision: "PowerShell-friendly composition seams: inject function sets, scriptblocks, configuration, and file paths (deny-list path, machinery-list path, catalog path) rather than hard-wiring filesystem or host behavior into governance/reviewer logic."
    enforcement: [review, tests]
  - id: "code-rule.dtos-between-services"
    checked: true
    decision: "Treat deny-list entries, machinery-list entries, catalog rows, boundary-authorization results, honesty-check verdicts, containment records, and release-model records as local DTO/contract artifacts with named fields."
    enforcement: [review, tests]
  - id: "code-rule.avoid-common-utility-libs"
    checked: true
    decision: "No broad utility modules; extract only focused seams around real boundaries (deny-list reading, delta computation, claims parsing, release-model resolution)."
    enforcement: [review]
  - id: "code-rule.immutability-intent"
    checked: true
    decision: "Run records, containment records, and gate outputs are immutable per-run evidence; reconciliation and replay create new records rather than mutating prior evidence."
    enforcement: [review, tests]
  - id: "code-rule.comments-wisely"
    checked: true
    decision: "Comments explain trust-boundary rationale (why fail-closed here, fail-open there), strip-list membership reasons, and T096/D5 constraints; never restate control flow."
    enforcement: [review]
  - id: "code-rule.no-magic-numbers"
    checked: true
    decision: "The 600-second floor, ratchet delta threshold, and ceiling constants are named values with the workshop decision cited at the definition site."
    enforcement: [review]
  - id: "code-rule.optimize-apis-for-call-site"
    checked: true
  - id: "code-rule.stronger-domain-types"
    checked: true
    decision: "Named contract fields, enum-like statuses (containment-violated, stale-vs-current, independence_source), schema versions, and explicit failure categories over stringly-typed records."
    enforcement: [review, tests]
  - id: "code-rule.object-invariants"
    checked: true
    decision: "Guard impossible states as internal defects: an evidence-fresh verdict on a claims-increasing tracker delta, a second boundary advance without authorization, an independence label without a source."
    enforcement: [tests, review]
  - id: "code-rule.no-leaky-mutable-internals"
    checked: true
  - id: "code-rule.normalize-state"
    checked: true
    decision: "start-context.json boundary_enforcement stays the single cursor truth; run records under .specrew/review/** stay the single review-evidence truth; no duplicated unowned gate state."
    enforcement: [review, tests]
  - id: "code-rule.simple-trustworthy-tests"
    checked: true
    decision: "Deterministic Pester tests and fixtures for the ratchet, honesty check, strips, budget resolution, deny-list lint, release-model inference, and detector classification; the paired-honesty-test rule governs shape."
    enforcement: [tests]
  - id: "code-rule.docs-as-api-test"
    checked: true
  - id: "code-rule.language-native-constructs"
    checked: true
  - id: "code-rule.secure-coding-defaults"
    checked: true
    decision: "No env vars, credentials, raw prompts, or ambient state persisted in records; origin paths never enter reviewer-visible artifacts (W2); containment records stay origin-side."
    enforcement: [review, tests]
  - id: "code-rule.solid-baseline"
    checked: true
  - id: "code-rule.strategy-state-over-repeated-conditionals"
    checked: true
    decision: "Per-host variability lives in catalog rows (default_timeout_seconds), never host-name conditionals in core logic — the catalog stays the only harness-data seam."
    enforcement: [review]
  - id: "code-rule.polymorphism-mechanism"
    checked: true
  - id: "code-rule.complex-code-stable"
    checked: true
    decision: "Stable identity/gate/authorization logic inward; volatile lists and budgets in data files."
    enforcement: [review]
  - id: "code-rule.anti-corruption-layers"
    checked: true
  - id: "code-rule.type-inference-deliberate"
    checked: true
  - id: "code-rule.concurrency-over-locks"
    checked: true
    decision: "Unique run ids and immutable per-run records; no shared mutable state; no new concurrent infrastructure."
    enforcement: [review, tests]
  - id: "code-rule.idiomatic-error-handling"
    checked: true
    decision: "Strict mode + Stop semantics; expected external failures (timeout, unavailable host, unparseable tracker) are structured operational outcomes; invariant violations fail loudly."
    enforcement: [review, tests]
  - id: "code-rule.careful-retries"
    checked: true
    decision: "No self-retry that consumes human trust surface: budget increases and remediations are human-typed (T096); schema/invariant defects are never retried."
    enforcement: [review, tests]
  - id: "code-rule.logging-traceability"
    checked: true
    decision: "run_id correlation across CLI message, durable record, and gate output; boundary decisions record AuthCommitHash; independence labels record independence_source."
    enforcement: [review, tests]
  - id: "code-rule.robustness-state-boundaries"
    checked: true
    decision: "Distinguish skipped-boundary, containment-violated, budget-kill, ceiling-halt, stale-checkpoint, honesty-check-declined, and internal-defect as separate outcomes with separate teachings."
    enforcement: [review, tests]
  - id: "code-rule.testing-posture"
    checked: true
    decision: "Deterministic Pester unit/contract/fixture tests; live host smoke only when configured and explicitly authorized; toolchain-bump verification via scratch-dir probes + suites on a 0.12.9 fixture."
    enforcement: [tests, review]
  - id: "code-rule.evidence-driven-performance"
    checked: false
    decision: "Exception: governance/tooling correctness work; no performance tuning focus unless a measurable issue appears (W9's incremental baselines are correctness-of-intent, driven by the recorded 408s field evidence, not speculative tuning)."
  - id: "code-rule.copy-semantics"
    checked: true
  - id: "code-rule.extension-points"
    checked: true
    decision: "New volatility extends through data files (deny-list terms, machinery paths, catalog columns) — never by editing core logic per host or per leak."
    enforcement: [review]
  - id: "code-rule.api-service-design"
    checked: true
    decision: "Local file/CLI shapes are public integration contracts: schema_version, stable fields, additive evolution per the I3 asymmetric package."
    enforcement: [review, tests]
  - id: "code-rule.authz-security-context"
    checked: true
    decision: "T096 (human-typed remediations/acks/increases) and D5 (blocking verdicts never agent-overridable) are enforced at input provenance; teaching texts may name commands, never grant agent power."
    enforcement: [review, tests]
  - id: "code-rule.validation-boundaries"
    checked: true
    decision: "Validate deny-list schema, catalog rows, tracker claims, boundary cursor state, and release-model records at read boundaries; fail direction per the I3 asymmetric package."
    enforcement: [tests, review]
  - id: "code-rule.write-conflict-semantics"
    checked: true
    decision: "Durable writes idempotent by run id / boundary crossing; atomic replace for state files (the handover-writer pattern); never delete-then-recreate."
    enforcement: [tests, review]
  - id: "code-rule.collection-query-semantics"
    checked: false
    decision: "Exception: no user collection query surfaces."
  - id: "code-rule.pagination-delivery"
    checked: false
    decision: "Exception: no paginated delivery surface."
  - id: "code-rule.protocol-choice"
    checked: true
    decision: "Local file/stdin/stdout/process-exit contracts only."
    enforcement: [review]
  - id: "code-rule.messaging-event-processing"
    checked: false
    decision: "Exception: no queue, pub-sub, event stream, or background worker introduced."
  - id: "code-rule.cache-boundaries"
    checked: false
    decision: "Exception: no cache introduced; state files are records, not communication channels."
  - id: "code-rule.lts-version-check"
    checked: true
    decision: "Existing PowerShell 7.x baseline; Spec-Kit pinned 0.12.9 and Squad 0.11.0 per the I2 single-tested-pin decision."
    enforcement: [review]
  - id: "code-rule.framework-validation"
    checked: true
  - id: "code-rule.shared-code-packaging"
    checked: true
    decision: "Ship through existing module/deployment surfaces; FileList + mirror parity per the 198 custom rules; no new package."
    enforcement: [review, tests]
  - id: "code-rule.public-api-reusable-design"
    checked: true
custom_rules:
  - id: "feature-198.rule.provider-mirror-parity"
    text: "Every extensions/specrew-speckit script change syncs its .specify mirror in the same commit (ProviderMirrorParity)."
    scope: "feature-198"
    provenance: "free-text"
  - id: "feature-198.rule.psd1-filelist"
    text: "Every new shipped file (deny-list data, machinery-path list, methodology-gate template, new scripts) joins Specrew.psd1 FileList in the commit that creates it."
    scope: "feature-198"
    provenance: "free-text"
  - id: "feature-198.rule.born-clean"
    text: "Every template, prompt, skill, or refocus surface this feature touches passes SelfLeakLintLane from its first commit; 205-W1 lands in iteration 001 so nothing needs retro-scrubbing."
    scope: "feature-198"
    provenance: "free-text"
  - id: "feature-198.rule.scratch-probes-only"
    text: "Agentic/init CLI probes (specify, squad, copilot/codex/agy/claude) run in scratch directories ONLY, never a governed cwd - their hooks and init flows mutate lifecycle state."
    scope: "feature-198"
    provenance: "free-text"
  - id: "feature-198.rule.remote-main-sync"
    text: "Merge or rebase the feature branch with latest remote main before each iteration's implement phase; a large conflict surface becomes its own preparatory step."
    scope: "feature-198"
    provenance: "free-text"
  - id: "feature-198.rule.paired-honesty-tests"
    text: "Every honesty invariant ships as a paired test (legitimate path works + abuse path fails) with message-content assertions for agent-action transparency; this is a code-review enforcement item, not a plan note."
    scope: "feature-198"
    provenance: "free-text"
dependency_policy:
  stance: "use-existing-no-new-dependency"
provenance:
  confirmation: "human-confirmed"
  confirmation_scope: "lens-question"
