name: Specrew CI

env:
  SPEC_KIT_VERSION: '0.12.9'
  SQUAD_VERSION: '0.11.0'

on:
  push:
    branches: [ main, 001-specrew-product ]
  pull_request:
    branches: [ main, 001-specrew-product ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: markdownlint '**/*.md' --ignore node_modules --ignore .squad --ignore .specify

      - name: Setup PowerShell
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $scriptFiles = Get-ChildItem -Path . -Filter *.ps1 -Recurse -File |
                         Where-Object { $_.FullName -notmatch '[\\/]\.(git|squad|specify)[\\/]' }
          if ($scriptFiles.Count -gt 0) {
            $results = $scriptFiles | ForEach-Object {
              # specrew-self-ok: tracked debt - retired by the FR-026 deploy-list surgery (F-198 iteration 004, issue 2909)
              Invoke-ScriptAnalyzer -Path $_.FullName -Settings PSGallery
            }
            if ($results) {
              $results | Format-Table -AutoSize
              exit 1
            }
          }
          else {
            Write-Host 'No PowerShell scripts found to lint'
          }

      - name: Validate iteration governance
        shell: pwsh
        run: ./extensions/specrew-speckit/scripts/validate-governance.ps1 -ProjectPath .

  deterministic-gate:
    name: Deterministic gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install specify CLI
        run: uv tool install --force specify-cli --from "git+https://github.com/github/spec-kit.git@v${SPEC_KIT_VERSION}"

      - name: Install squad CLI
        run: npm install -g "@bradygaster/squad-cli@${SQUAD_VERSION}"

      - name: Integration - bootstrap to iteration
        shell: pwsh
        run: ./tests/integration/bootstrap-to-iteration.ps1

      - name: Integration - bootstrap asset blocker recovery
        shell: pwsh
        run: ./tests/integration/bootstrap-asset-blocker-recovery.ps1

      - name: Integration - brownfield conflict handling
        shell: pwsh
        run: ./tests/integration/brownfield-conflict-handling.ps1

      - name: Integration - validate versions cli behavior
        shell: pwsh
        run: ./tests/integration/validate-versions-cli-behavior.ps1

      - name: Integration - drift scenario
        shell: pwsh
        run: ./tests/integration/drift-scenario.ps1

      - name: Integration - iteration resume
        shell: pwsh
        run: ./tests/integration/iteration-resume.ps1

      - name: Integration - task progress tracking
        shell: pwsh
        run: ./tests/integration/task-progress-tracking.tests.ps1

      - name: Integration - iteration state truth
        shell: pwsh
        run: ./tests/integration/iteration-state-truth.tests.ps1

      - name: Integration - planning effort model
        shell: pwsh
        run: ./tests/integration/planning-effort-model.ps1

      - name: Integration - planning overcommit
        shell: pwsh
        run: ./tests/integration/planning-overcommit.ps1

      - name: Integration - process quality report
        shell: pwsh
        run: ./tests/integration/process-quality-report.ps1

      - name: Integration - process quality scorer
        shell: pwsh
        run: ./tests/integration/process-quality-scorer.ps1

      - name: Integration - GitHub Actions Node runtime pins
        shell: pwsh
        run: ./tests/integration/github-actions-node-runtime-pins.tests.ps1

  contract-lane:
    name: Contract lane
    runs-on: ubuntu-latest
    needs: deterministic-gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install specify CLI
        run: uv tool install --force specify-cli --from "git+https://github.com/github/spec-kit.git@v${SPEC_KIT_VERSION}"

      - name: Install squad CLI
        run: npm install -g "@bradygaster/squad-cli@${SQUAD_VERSION}"

      - name: Validation contract lane
        shell: pwsh
        run: ./tests/integration/validation-contract-lane.ps1