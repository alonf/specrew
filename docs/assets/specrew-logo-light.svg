<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" role="img" aria-label="Specrew — Governed Agentic SDLC">
  <defs>
    <linearGradient id="specrewGradientLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>

  <!-- Icon (left, 100x100 inside a 110x110 padded box) -->
  <g transform="translate(10, 10)">
    <polygon
      points="30,8 70,8 92,50 70,92 30,92 8,50"
      fill="none"
      stroke="url(#specrewGradientLight)"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <g fill="url(#specrewGradientLight)" stroke="url(#specrewGradientLight)" stroke-width="2.6" stroke-linecap="round">
      <line x1="28" y1="32" x2="68" y2="32"/>
      <circle cx="28" cy="32" r="3.2"/>
      <circle cx="48" cy="32" r="3.2"/>
      <circle cx="68" cy="32" r="3.2"/>
      <line x1="68" y1="32" x2="48" y2="50"/>
      <line x1="48" y1="50" x2="72" y2="50"/>
      <circle cx="48" cy="50" r="3.2"/>
      <circle cx="60" cy="50" r="3.2"/>
      <circle cx="72" cy="50" r="3.2"/>
      <line x1="48" y1="50" x2="28" y2="68"/>
      <line x1="28" y1="68" x2="68" y2="68"/>
      <circle cx="28" cy="68" r="3.2"/>
      <circle cx="48" cy="68" r="3.2"/>
      <circle cx="68" cy="68" r="3.2"/>
    </g>
  </g>

  <!-- Wordmark + tagline (right) -->
  <g transform="translate(135, 0)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="0" y="65" font-size="42" font-weight="600" fill="#0F172A" letter-spacing="-0.5">Specrew</text>
    <text x="2" y="90" font-size="12" font-weight="600" letter-spacing="3" fill="#0E7490">GOVERNED AGENTIC SDLC</text>
  </g>
</svg>
