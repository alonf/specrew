<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Specrew icon">
  <defs>
    <linearGradient id="specrewGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal frame -->
  <polygon
    points="30,8 70,8 92,50 70,92 30,92 8,50"
    fill="none"
    stroke="url(#specrewGradient)"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- S-path of connected nodes (top→middle→bottom with diagonal connectors) -->
  <g fill="url(#specrewGradient)" stroke="url(#specrewGradient)" stroke-width="2.6" stroke-linecap="round">
    <!-- Top horizontal stroke -->
    <line x1="28" y1="32" x2="68" y2="32"/>
    <circle cx="28" cy="32" r="3.2"/>
    <circle cx="48" cy="32" r="3.2"/>
    <circle cx="68" cy="32" r="3.2"/>

    <!-- Diagonal down-right (top-right to middle-center) -->
    <line x1="68" y1="32" x2="48" y2="50"/>

    <!-- Middle horizontal stroke (right half) -->
    <line x1="48" y1="50" x2="72" y2="50"/>
    <circle cx="48" cy="50" r="3.2"/>
    <circle cx="60" cy="50" r="3.2"/>
    <circle cx="72" cy="50" r="3.2"/>

    <!-- Diagonal down-left (middle-left to bottom-center) -->
    <line x1="48" y1="50" x2="28" y2="68"/>

    <!-- Bottom horizontal stroke -->
    <line x1="28" y1="68" x2="68" y2="68"/>
    <circle cx="28" cy="68" r="3.2"/>
    <circle cx="48" cy="68" r="3.2"/>
    <circle cx="68" cy="68" r="3.2"/>
  </g>
</svg>
