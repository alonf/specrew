name: Specrew CI

env:
  SPEC_KIT_VERSION: '0.8.4'
  SQUAD_VERSION: '0.9.1'

on:
  push:
    branches: [ main, 001-specrew-product ]
  pull_request:
    branches: [ main, 001-specrew-product ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        if: github.event_name != 'pull_request'
        run: markdownlint '**/*.md' --ignore node_modules --ignore .squad --ignore .specify

      - name: Lint changed Markdown files
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.event.pull_request.base.ref }}"
          if ! git rev-parse --verify "$base" >/dev/null 2>&1; then
            echo "Base ref $base unavailable; falling back to full Markdown lint."
            markdownlint '**/*.md' --ignore node_modules --ignore .squad --ignore .specify
            exit 0
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=d "$base"...HEAD -- '*.md' | grep -vE '^(node_modules/|\.squad/|\.specify/)' || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo 'No changed Markdown files to lint'
            exit 0
          fi

          markdownlint "${files[@]}"

      - name: Setup PowerShell
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint PowerShell scripts
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          # PSScriptAnalyzer with PSGallery settings reports many style warnings
          # (PSUseSingularNouns, PSUseApprovedVerbs, etc.) on pre-existing scripts.
          # These predate F-023 and are tracked under Proposal 037 for systematic
          # cleanup. Filter to Severity = Error so only real defects block CI;
          # warnings still print for awareness but don't fail the build.
          $scriptFiles = Get-ChildItem -Path . -Filter *.ps1 -Recurse -File |
                         Where-Object { $_.FullName -notmatch '[\\/]\.(git|squad|specify)[\\/]' }
          if ($scriptFiles.Count -gt 0) {
            $allResults = $scriptFiles | ForEach-Object {
              Invoke-ScriptAnalyzer -Path $_.FullName -Settings PSGallery
            }
            $errors = @($allResults | Where-Object { $_.Severity -eq 'Error' })
            $warnings = @($allResults | Where-Object { $_.Severity -eq 'Warning' })
            if ($warnings.Count -gt 0) {
              Write-Host "::group::PSScriptAnalyzer warnings (Proposal 037 cleanup queue, non-blocking)"
              $warnings | Format-Table -AutoSize
              Write-Host "::endgroup::"
              Write-Host ("Warnings: {0} (not blocking)" -f $warnings.Count)
            }
            if ($errors.Count -gt 0) {
              Write-Host "PSScriptAnalyzer errors (blocking):"
              $errors | Format-Table -AutoSize
              exit 1
            }
            Write-Host ("PASS: no PSScriptAnalyzer errors. Warnings count: {0}" -f $warnings.Count)
          }
          else {
            Write-Host 'No PowerShell scripts found to lint'
          }

      - name: Lint changed PowerShell scripts
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          # PSScriptAnalyzer with PSGallery settings reports many style warnings
          # (PSUseSingularNouns, PSUseApprovedVerbs, etc.) on pre-existing scripts.
          # These predate F-023 and are tracked under Proposal 037 for systematic
          # cleanup. Filter to Severity = Error so only real defects block CI;
          # warnings still print for awareness but don't fail the build.
          $baseRef = "origin/${{ github.event.pull_request.base.ref }}"
          $null = & git rev-parse --verify $baseRef 2>$null
          if ($LASTEXITCODE -eq 0) {
            $scriptFiles = @(
              & git diff --name-only --diff-filter=d "$baseRef...HEAD" -- '*.ps1' 2>$null |
                ForEach-Object { [string]$_ } |
                Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
                Where-Object { $_ -notmatch '^(?:\.git|\.squad|\.specify)(?:/|$)' }
            )
            if ($scriptFiles.Count -eq 0) {
              Write-Host 'No changed PowerShell scripts found to lint'
              exit 0
            }
          }
          else {
            Write-Host "Base ref $baseRef unavailable; falling back to full PowerShell lint"
            $scriptFiles = Get-ChildItem -Path . -Filter *.ps1 -Recurse -File |
                           Where-Object { $_.FullName -notmatch '[\\/]\.(git|squad|specify)[\\/]' } |
                           Select-Object -ExpandProperty FullName
          }

          $allResults = $scriptFiles | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Settings PSGallery
          }
          $errors = @($allResults | Where-Object { $_.Severity -eq 'Error' })
          $warnings = @($allResults | Where-Object { $_.Severity -eq 'Warning' })
          if ($warnings.Count -gt 0) {
            Write-Host "::group::PSScriptAnalyzer warnings (Proposal 037 cleanup queue, non-blocking)"
            $warnings | Format-Table -AutoSize
            Write-Host "::endgroup::"
            Write-Host ("Warnings: {0} (not blocking)" -f $warnings.Count)
          }
          if ($errors.Count -gt 0) {
            Write-Host "PSScriptAnalyzer errors (blocking):"
            $errors | Format-Table -AutoSize
            exit 1
          }
          Write-Host ("PASS: no PSScriptAnalyzer errors. Warnings count: {0}" -f $warnings.Count)

      - name: Validate iteration governance (PR)
        if: github.event_name == 'pull_request'
        timeout-minutes: 25
        shell: pwsh
        run: ./extensions/specrew-speckit/scripts/validate-governance.ps1 -ProjectPath . -ChangedOnly

      - name: Validate iteration governance (push)
        if: github.event_name != 'pull_request'
        timeout-minutes: 25
        shell: pwsh
        env:
          GITHUB_BASE_REF: ${{ github.event.before }}
        run: ./extensions/specrew-speckit/scripts/validate-governance.ps1 -ProjectPath . -ChangedOnly

      - name: Integration - legacy state readers
        shell: pwsh
        run: pwsh -NoProfile -File ./tests/integration/Test-LegacyStateReaders.Tests.ps1

  deterministic-gate:
    name: Deterministic gate
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install specify CLI
        run: uv tool install --force specify-cli --from "git+https://github.com/github/spec-kit.git@v${SPEC_KIT_VERSION}"

      - name: Install squad CLI
        run: npm install -g "@bradygaster/squad-cli@${SQUAD_VERSION}"

      - name: Integration - bootstrap to iteration
        shell: pwsh
        run: ./tests/integration/bootstrap-to-iteration.ps1

      - name: Integration - bootstrap asset blocker recovery
        if: runner.os != 'Linux'
        shell: pwsh
        # .cmd shim scripts (bootstrap-asset-blocker-recovery.ps1 invokes .cmd-based tooling)
        # are not portable to Linux; native sh/bash equivalents not yet available.
        # Real fix (multi-platform bootstrap shimming) is queued for post-F-024 work.
        # See: bootstrap-asset-blocker-recovery.ps1 for context.
        run: ./tests/integration/bootstrap-asset-blocker-recovery.ps1

      - name: Integration - brownfield conflict handling
        shell: pwsh
        run: ./tests/integration/brownfield-conflict-handling.ps1

      - name: Integration - deploy extension missing-source tolerance
        shell: pwsh
        run: ./tests/integration/deploy-extension-missing-source-tolerance.tests.ps1

      - name: Integration - FileList completeness (bidirectional)
        shell: pwsh
        run: ./tests/integration/filelist-completeness.tests.ps1

      - name: Integration - validate versions cli behavior
        if: runner.os != 'Linux'
        shell: pwsh
        # .cmd shim scripts (validate-versions-cli-behavior.ps1 invokes .cmd-based tooling)
        # are not portable to Linux; native sh/bash equivalents not yet available.
        # Real fix (multi-platform bootstrap shimming) is queued for post-F-024 work.
        # See: validate-versions-cli-behavior.ps1 for context.
        run: ./tests/integration/validate-versions-cli-behavior.ps1

      - name: Integration - drift scenario
        shell: pwsh
        run: ./tests/integration/drift-scenario.ps1

      - name: Integration - iteration resume
        shell: pwsh
        run: ./tests/integration/iteration-resume.ps1

      - name: Integration - task progress tracking
        shell: pwsh
        run: ./tests/integration/task-progress-tracking.tests.ps1

      - name: Integration - iteration state truth
        shell: pwsh
        run: ./tests/integration/iteration-state-truth.tests.ps1

      - name: Integration - planning effort model
        shell: pwsh
        run: ./tests/integration/planning-effort-model.ps1

      - name: Integration - planning overcommit
        shell: pwsh
        run: ./tests/integration/planning-overcommit.ps1

      - name: Integration - process quality report
        shell: pwsh
        run: ./tests/integration/process-quality-report.ps1

      - name: Integration - process quality scorer
        shell: pwsh
        run: ./tests/integration/process-quality-scorer.ps1

      - name: Integration - version info states + prerelease-label parse (Proposal 079 + finding #2)
        shell: pwsh
        run: ./tests/integration/version-info-states.tests.ps1

      - name: Integration - boundary-sync markdownlint gate (.squad exclusion regression guard)
        shell: pwsh
        run: ./tests/integration/boundary-sync-markdownlint-gate.tests.ps1

      - name: Integration - version mismatch warning (start, non-blocking + actionable)
        shell: pwsh
        run: ./tests/integration/version-checks.tests.ps1

      - name: Integration - Unix resolver path semantics (F-160 / Proposal 160; POSIX branch runs on this Ubuntu lane)
        shell: pwsh
        run: ./tests/integration/unix-resolver-path-semantics.tests.ps1

      - name: Integration - managed runtime sidecar marker provenance (F-160 / Proposal 161)
        shell: pwsh
        run: ./tests/integration/managed-runtime-sidecar.tests.ps1

      - name: Integration - managed-skill stuck-preserving deploy-level guard (F-161)
        shell: pwsh
        run: ./tests/integration/managed-skill-stuck-preserving.tests.ps1

      - name: Integration - gate-stop skill contract (F-165; disallowed-tools + six-section packet + Claude routing + .specify mirror parity)
        shell: pwsh
        run: ./tests/integration/gate-stop-skill.tests.ps1

  contract-lane:
    name: Contract lane
    runs-on: ubuntu-latest
    needs: deterministic-gate
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install specify CLI
        run: uv tool install --force specify-cli --from "git+https://github.com/github/spec-kit.git@v${SPEC_KIT_VERSION}"

      - name: Install squad CLI
        run: npm install -g "@bradygaster/squad-cli@${SQUAD_VERSION}"

      - name: Validation contract lane
        shell: pwsh
        run: ./tests/integration/validation-contract-lane.ps1

      - name: Start-command non-interactive first-run regression
        shell: pwsh
        run: ./tests/integration/start-command-non-interactive-first-run.tests.ps1
