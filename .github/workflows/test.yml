name: Test

on:
  push:
    branches: [ main, 001-specrew-product ]
  pull_request:
    branches: [ main, 001-specrew-product ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Markdown lint (if available)
        shell: bash
        run: |
          if command -v markdownlint >/dev/null 2>&1; then
            markdownlint '**/*.md' --ignore node_modules --ignore .squad --ignore .specify
          elif command -v npx >/dev/null 2>&1; then
            if npx --yes markdownlint-cli '**/*.md' --ignore node_modules --ignore .squad --ignore .specify; then
              echo "markdownlint-cli executed via npx"
            else
              echo "SKIP: markdownlint-cli unavailable or install failed"
            fi
          else
            echo "SKIP: markdownlint and npx are unavailable"
          fi

      - name: PowerShell lint (if available)
        shell: pwsh
        run: |
          if (-not (Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue)) {
            Write-Host 'SKIP: PSScriptAnalyzer is unavailable'
            exit 0
          }

          $scriptFiles = Get-ChildItem -Path . -Filter *.ps1 -Recurse -File |
            Where-Object { $_.FullName -notmatch '[\\/]\.(git|squad|specify)[\\/]' }

          if (-not $scriptFiles -or $scriptFiles.Count -eq 0) {
            Write-Host 'SKIP: No PowerShell scripts found'
            exit 0
          }

          # PSScriptAnalyzer with PSGallery settings reports many style warnings
          # (PSUseSingularNouns, PSUseApprovedVerbs, etc.) on pre-existing scripts.
          # These predate F-023 and are tracked under Proposal 037. Filter to
          # Severity = Error so only real defects block CI; warnings print for
          # awareness but don't fail the build.
          $allFindings = @()
          foreach ($file in $scriptFiles) {
            $allFindings += Invoke-ScriptAnalyzer -Path $file.FullName -Settings PSGallery
          }

          $errors = @($allFindings | Where-Object { $_.Severity -eq 'Error' })
          $warnings = @($allFindings | Where-Object { $_.Severity -eq 'Warning' })

          if ($warnings.Count -gt 0) {
            Write-Host "::group::PSScriptAnalyzer warnings (Proposal 037 cleanup queue, non-blocking)"
            $warnings | Format-Table -AutoSize
            Write-Host "::endgroup::"
            Write-Host ("Warnings: {0} (not blocking)" -f $warnings.Count)
          }

          if ($errors.Count -gt 0) {
            Write-Host "PSScriptAnalyzer errors (blocking):"
            $errors | Format-Table -AutoSize
            exit 1
          }

          Write-Host ("PASS: no PSScriptAnalyzer errors. Warnings count: {0}" -f $warnings.Count)

      - name: Integration - bootstrap to iteration
        shell: pwsh
        run: ./tests/integration/bootstrap-to-iteration.ps1

      - name: Integration - drift scenario
        shell: pwsh
        run: ./tests/integration/drift-scenario.ps1
