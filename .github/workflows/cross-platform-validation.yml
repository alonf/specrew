name: Cross-Platform Validation

on:
  push:
    branches:
      - main
      - 'feature/**'
      - '0*-*'  # Feature branches like 019-specrew-distribution-module
      - '1*-*'  # Feature branches like 140-unix-native-install
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-ubuntu:
    name: Ubuntu Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup PowerShell
        shell: bash
        run: |
          # Install PowerShell 7.x
          wget -q https://github.com/PowerShell/PowerShell/releases/download/v7.4.1/powershell_7.4.1-1.deb_amd64.deb
          sudo dpkg -i powershell_7.4.1-1.deb_amd64.deb
          sudo apt-get install -f
          pwsh --version

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup uv
        shell: bash
        run: |
          # specrew init's pre-flight requires uv for spec-kit bootstrap on Linux/macOS.
          curl -LsSf https://astral.sh/uv/install.sh | sh
          # uv installs into $HOME/.local/bin by default; expose it on PATH for later steps.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Verify uv is reachable in subsequent shells.
          "$HOME/.local/bin/uv" --version

      - name: Test module manifest
        shell: pwsh
        run: |
          Write-Host "Testing module manifest..." -ForegroundColor Cyan
          Test-ModuleManifest -Path ./Specrew.psd1
          Write-Host "✅ Module manifest valid" -ForegroundColor Green
      
      - name: Import module
        shell: pwsh
        run: |
          Write-Host "Importing Specrew module..." -ForegroundColor Cyan
          Import-Module ./Specrew.psd1
          $commands = Get-Command -Module Specrew
          Write-Host "✅ Module imported; $($commands.Count) commands exported:" -ForegroundColor Green
          $commands | ForEach-Object { Write-Host "  - $($_.Name)" }
      
      - name: Test specrew init
        shell: pwsh
        run: |
          Write-Host "Testing specrew init in clean directory..." -ForegroundColor Cyan
          $repoRoot = (Get-Location).Path
          $testDir = New-Item -ItemType Directory -Path "./test-init-$([Guid]::NewGuid().ToString('N').Substring(0,8))" -Force
          $testDirPath = $testDir.FullName

          # Initialize a fresh git repo in the test directory so init can resolve project root.
          git -C $testDirPath init --quiet
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to git init the scratch test directory."
            exit 1
          }

          # Run init using the actual supported parameter surface: -ProjectPath / -Force / -NoAgents.
          Import-Module "$repoRoot/Specrew.psd1"
          specrew-init -ProjectPath $testDirPath -Force -NoAgents

          # Verify artifacts were created
          $requiredPaths = @('.specify', '.squad', '.github')
          foreach ($path in $requiredPaths) {
            $resolved = Join-Path -Path $testDirPath -ChildPath $path
            if (-not (Test-Path -LiteralPath $resolved)) {
              Write-Error "Missing required path: $path"
              exit 1
            }
          }

          Remove-Item -Recurse -Force $testDirPath
          Write-Host "✅ specrew init completed successfully" -ForegroundColor Green
      
      - name: Test specrew where
        shell: pwsh
        run: |
          Write-Host "Testing specrew where (dashboard renderer)..." -ForegroundColor Cyan
          Import-Module ./Specrew.psd1
          
          # Run where command (should work even without full project setup)
          $output = specrew-where 2>&1 | Out-String
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "specrew where output:" -ForegroundColor Yellow
            Write-Host $output
            Write-Host "Note: Command may require full project setup; non-zero exit is acceptable for CI validation" -ForegroundColor Gray
          } else {
            Write-Host "✅ specrew where executed successfully" -ForegroundColor Green
          }
      
      - name: Test path separator handling
        shell: pwsh
        run: |
          Write-Host "Testing path separator handling..." -ForegroundColor Cyan
          
          # Verify Join-Path usage in core scripts
          $coreScripts = @(
            './scripts/specrew-start.ps1',
            './scripts/specrew-init.ps1',
            './scripts/internal/dashboard-renderer.ps1'
          )
          
          foreach ($script in $coreScripts) {
            if (Test-Path $script) {
              $content = Get-Content $script -Raw
              
              # Check for hardcoded backslashes in path construction (not in comments or strings)
              # This is a basic check; detailed audit is done manually
              if ($content -match '\$\w+\\[a-zA-Z]') {
                Write-Warning "Potential hardcoded backslash in $script"
              }
            }
          }
          
          Write-Host "✅ Path separator check complete" -ForegroundColor Green
      
      - name: Summary
        shell: pwsh
        run: |
          Write-Host "`n=== Cross-Platform Validation Summary ===" -ForegroundColor Cyan
          Write-Host "Platform: $($PSVersionTable.Platform)" -ForegroundColor White
          Write-Host "OS: $($PSVersionTable.OS)" -ForegroundColor White
          Write-Host "PowerShell: $($PSVersionTable.PSVersion)" -ForegroundColor White
          Write-Host "✅ All Ubuntu validation checks passed" -ForegroundColor Green

  validate-macos:
    name: macOS Validation
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup PowerShell
        shell: bash
        run: |
          # PowerShell 7.x is pre-installed on macos-latest runners; verify and
          # fall back to a direct GitHub-release install if it ever isn't.
          if command -v pwsh >/dev/null 2>&1; then
            pwsh --version
          else
            echo "PowerShell not found on runner; installing from GitHub release..."
            arch="$(uname -m)"
            if [ "$arch" = "arm64" ]; then
              pkg_arch="osx-arm64"
            else
              pkg_arch="osx-x64"
            fi
            curl -fsSL -o pwsh.pkg "https://github.com/PowerShell/PowerShell/releases/download/v7.4.1/powershell-7.4.1-${pkg_arch}.pkg"
            sudo installer -pkg pwsh.pkg -target /
            pwsh --version
          fi

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup uv
        shell: bash
        run: |
          # specrew init's pre-flight requires uv for spec-kit bootstrap on Linux/macOS.
          curl -LsSf https://astral.sh/uv/install.sh | sh
          # uv installs into $HOME/.local/bin by default; expose it on PATH for later steps.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Verify uv is reachable in subsequent shells.
          "$HOME/.local/bin/uv" --version

      - name: Test module manifest
        shell: pwsh
        run: |
          Write-Host "Testing module manifest on macOS..." -ForegroundColor Cyan
          Test-ModuleManifest -Path ./Specrew.psd1
          Write-Host "✅ Module manifest valid on macOS" -ForegroundColor Green
      
      - name: Import module
        shell: pwsh
        run: |
          Write-Host "Importing Specrew module on macOS..." -ForegroundColor Cyan
          Import-Module ./Specrew.psd1
          $commands = Get-Command -Module Specrew
          Write-Host "✅ Module imported; $($commands.Count) commands exported" -ForegroundColor Green
      
      - name: Wrapper runtime suite (FR-002/003/004/008) on macOS (T020)
        shell: bash
        run: |
          sh tests/integration/wrapper-runtime.sh

      - name: Native wrapper install + command surface on macOS (T020)
        shell: bash
        run: |
          # Real install-shell-wrappers -> PATH -> native specrew commands on macOS.
          bindir="$HOME/.local/specrew-bin"
          mkdir -p "$bindir"
          pwsh -NoProfile -Command "Import-Module ./Specrew.psd1 -Force; specrew install-shell-wrappers --bin-dir '$bindir'"
          export PATH="$bindir:$PATH"
          command -v specrew
          specrew version
          specrew start --help
          echo "native specrew wrapper surface works on macOS"

      - name: Interactive `start` deferred-launch regression on macOS (beta2 TTY bug)
        shell: bash
        run: |
          # Same deferred-launch engagement proof on the macOS surface (required surface).
          sh tests/integration/start-deferred-launch.sh

      - name: Summary
        shell: pwsh
        run: |
          Write-Host "`n=== macOS Validation Summary ===" -ForegroundColor Cyan
          Write-Host "Platform: $($PSVersionTable.Platform)" -ForegroundColor White
          Write-Host "OS: $($PSVersionTable.OS)" -ForegroundColor White
          Write-Host "PowerShell: $($PSVersionTable.PSVersion)" -ForegroundColor White
          Write-Host "✅ macOS validation checks passed" -ForegroundColor Green

  review-runtime-fault-matrix:
    name: Deterministic fake-provider review runtime (${{ matrix.os }}) — never live support evidence
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify PowerShell and install pinned Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSVersionTable | Format-List | Out-Host
          if ($IsLinux) {
            & sudo pwsh -NoProfile -NonInteractive -Command "Install-Module Pester -RequiredVersion 5.7.1 -Scope AllUsers -Force -SkipPublisherCheck"
            if ($LASTEXITCODE -ne 0) { throw 'pester-allusers-install-failed' }
          }
          else {
            Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
          }
          Import-Module Pester -RequiredVersion 5.7.1 -Force

      - name: Prepare bounded cgroup v2 root for privileged Linux review-process tests
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eu
          sudo mkdir -p /sys/fs/cgroup/specrew-review-ci
          echo "SPECREW_REVIEW_CGROUP_ROOT=/sys/fs/cgroup/specrew-review-ci" >> "$GITHUB_ENV"

      - name: Run bounded deterministic review fault and conformance suites
        shell: pwsh
        env:
          SPECREW_REQUIRE_POSIX_RUNTIME_PROOF: '1'
        run: |
          $ErrorActionPreference = 'Stop'
          $runSuites = {
            $ErrorActionPreference = 'Stop'
            Import-Module Pester -RequiredVersion 5.7.1 -Force
            $suites = @(
              './tests/continuous-co-review/integration/review-cross-platform-fault-matrix.Tests.ps1'
              './tests/continuous-co-review/unit/review-harness-contract.Tests.ps1'
              './tests/continuous-co-review/unit/review-codex-copilot-harness.Tests.ps1'
              './tests/continuous-co-review/unit/review-cursor-antigravity-harness.Tests.ps1'
              './tests/continuous-co-review/unit/review-authority-store.Tests.ps1'
              './tests/continuous-co-review/unit/review-spend-allowance.Tests.ps1'
              './tests/continuous-co-review/unit/review-campaign-orchestrator.Tests.ps1'
              './tests/continuous-co-review/unit/review-result-ingestor.Tests.ps1'
              './tests/continuous-co-review/unit/review-target-port.Tests.ps1'
              './tests/continuous-co-review/unit/review-public-campaign-command.Tests.ps1'
              './tests/continuous-co-review/unit/worktree-containment.Tests.ps1'
            )
            if ($IsWindows) {
              $suites += './tests/continuous-co-review/unit/review-windows-runtime.Tests.ps1'
            }
            else {
              $suites += './tests/continuous-co-review/unit/review-posix-runtime.Tests.ps1'
            }
            foreach ($suite in $suites) {
              Write-Host "--- deterministic suite: $suite" -ForegroundColor Cyan
              $result = Invoke-Pester -Path $suite -Output Detailed -PassThru
              if ($result.FailedCount -gt 0) { throw "review-fault-suite-failed:$suite" }
            }
          }
          if ($IsLinux) {
            & sudo git config --global --add safe.directory ([IO.Path]::GetFullPath((Get-Location).Path))
            if ($LASTEXITCODE -ne 0) { throw 'privileged-linux-git-safe-directory-failed' }
            $encoded = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($runSuites.ToString()))
            & sudo --preserve-env=SPECREW_REVIEW_CGROUP_ROOT,SPECREW_REQUIRE_POSIX_RUNTIME_PROOF pwsh -NoProfile -NonInteractive -EncodedCommand $encoded
            if ($LASTEXITCODE -ne 0) { throw 'privileged-linux-review-fault-suite-failed' }
          }
          else {
            & $runSuites
          }

      - name: Clean delegated Linux cgroup root
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          sudo rmdir /sys/fs/cgroup/specrew-review-ci 2>/dev/null || true

  # ── Feature 140 (Unix-native install) Iteration 2: Ubuntu-first auto-install proof ──
  feature140-install-bootstrap:
    name: install.sh - shellcheck + detection + clean no-pwsh proof
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: shellcheck install.sh + shell tests
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck install.sh tests/integration/install-sh-detect.sh tests/integration/install-sh-prerelease.sh tests/integration/wrapper-runtime.sh tests/integration/start-deferred-launch.sh

      - name: Detection + fail-closed (os-release fixtures + macOS Homebrew branch) + --prerelease surface
        shell: bash
        run: |
          sh tests/integration/install-sh-detect.sh
          sh tests/integration/install-sh-prerelease.sh

      - name: install.sh end-to-end in a clean no-pwsh Ubuntu container (root path)
        shell: bash
        run: |
          # A bare ubuntu:24.04 container has no pwsh and no sudo: this exercises the ratified
          # root path ($SUDO empty) and the real auto-install. The BRANCH module is pre-seeded
          # onto PSModulePath so install.sh's "module already present -> skip the gallery" path
          # uses local code (Install-Module from PSGallery is Iteration-3 release-gate scope).
          docker run --rm -v "$PWD:/src:ro" ubuntu:24.04 sh -c '
            set -eu
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends ca-certificates git >/dev/null
            mkdir -p /opt/psmods/Specrew
            cp -a /src/. /opt/psmods/Specrew/
            rm -rf /opt/psmods/Specrew/.git
            # Simulate the PSGallery/NuGet round-trip: Install-Module does NOT preserve the Unix
            # execute bit. Strip +x from the packaged wrappers; install.sh + install-shell-wrappers
            # MUST restore it, else the symlinked specrew fails with "Permission denied".
            chmod -x /opt/psmods/Specrew/bin/* || true
            export PSModulePath=/opt/psmods:${PSModulePath:-}
            sh /opt/psmods/Specrew/install.sh --bin-dir /usr/local/bin
            command -v pwsh
            command -v specrew
            test -x /opt/psmods/Specrew/bin/specrew || { echo "FAIL: wrapper exec bit not restored after PSGallery-strip simulation"; exit 1; }
            specrew version
            echo "OK: clean-container no-pwsh bootstrap proved end-to-end (branch code; +x restored after PSGallery-strip simulation)"
          '

  feature140-wrapper-runtime:
    name: Ubuntu wrapper runtime proof (forwarding/symlink/pwsh-missing/passthrough)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PowerShell
        shell: bash
        run: |
          wget -q https://github.com/PowerShell/PowerShell/releases/download/v7.4.1/powershell_7.4.1-1.deb_amd64.deb
          sudo dpkg -i powershell_7.4.1-1.deb_amd64.deb || sudo apt-get install -f -y
          pwsh --version

      - name: Wrapper runtime suite (FR-002/003/004/008) on real Ubuntu sh + pwsh
        shell: bash
        run: |
          sh tests/integration/wrapper-runtime.sh

      - name: Interactive `start` deferred-launch regression (beta2 TTY bug)
        shell: bash
        run: |
          # Proves `specrew start` via the native wrapper / `pwsh -File` re-dispatches through
          # the module function so the host launches in TTY-preserving function context (not the
          # script-context headless fallback). CI has no TTY: proves the mechanism ENGAGES.
          sh tests/integration/start-deferred-launch.sh

  feature140-parity-cascade:
    name: Wrapper parity cascade (generate-then-commit drift + FileList parity)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PowerShell
        shell: bash
        run: |
          wget -q https://github.com/PowerShell/PowerShell/releases/download/v7.4.1/powershell_7.4.1-1.deb_amd64.deb
          sudo dpkg -i powershell_7.4.1-1.deb_amd64.deb || sudo apt-get install -f -y
          pwsh --version

      - name: Regenerate wrappers and assert no drift (registry -> bin)
        shell: pwsh
        run: |
          ./scripts/internal/generate-shell-wrappers.ps1 -Check
          if ($LASTEXITCODE -ne 0) { Write-Error "Wrapper drift detected (generator -Check)."; exit 1 }
          git diff --exit-code -- bin/
          if ($LASTEXITCODE -ne 0) { Write-Error "Committed bin/ wrappers differ from the generator output."; exit 1 }

      - name: Registry + FileList + docs parity tests (cascade docs arm, T023)
        shell: pwsh
        run: |
          $failed = $false
          foreach ($t in @('./tests/unit/wrapper-registry-parity.tests.ps1','./tests/unit/wrapper-filelist-parity.tests.ps1','./tests/unit/wrapper-docs-parity.tests.ps1')) {
            Write-Host "── $t ──" -ForegroundColor Cyan
            $out = & $t *>&1 | Out-String
            Write-Host $out
            if ($LASTEXITCODE -ne 0 -or $out -match '(?im)^\s*FAIL') { $failed = $true }
          }
          if ($failed) { Write-Error "Parity cascade tests failed."; exit 1 }
          Write-Host "✅ parity cascade green" -ForegroundColor Green
