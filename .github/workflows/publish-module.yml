# Secrets required for publishing:
#   - PSGALLERY_API_KEY
#
# Release modes:
#   - push v0.NN.0 tags -> publish-stable
#   - push v0.NN.0-beta.1 / rc.1 tags -> publish-prerelease
#   - workflow_dispatch supports dry-run / publish-prerelease / publish-stable / promote-prerelease
name: Publish Specrew module

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'dry-run validates stamp/publish without a live release; the publish/promote modes perform a real PSGallery publish'
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish-prerelease
          - publish-stable
          - promote-prerelease
      release_tag:
        description: 'Optional v0.NN.0 or v0.NN.0-beta.1 tag for workflow_dispatch publish/promote modes'
        required: false
        type: string

permissions:
  contents: write  # write needed for gh release create on tag push

jobs:
  prepublish-validation:
    # Docker-based E2E validation (FileList omissions, version-pin drift, corrupt
    # layouts) MUST run on Linux: the harness image is
    # mcr.microsoft.com/powershell:lts-ubuntu-22.04, which cannot be built on a
    # Windows runner ("operating system 'linux' cannot be used on this platform").
    # This job gates the windows-latest publish job below via `needs`.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate host registry and generated package projection
        shell: pwsh
        run: |
          ./scripts/internal/update-host-package-filelist.ps1 -ProjectRoot (Get-Location).Path -Check
          ./tests/integration/host-package-filelist.tests.ps1
          ./tests/integration/host-registry.tests.ps1
          ./tests/integration/host-coupling-firewall.tests.ps1

      - name: Pre-publish Docker harness validation
        shell: pwsh
        run: |
          # Trace: T006, FR-005, SC-001
          # Run Docker-based E2E validation to catch FileList omissions,
          # version pin drift, and corrupt layouts before PSGallery publish.

          Write-Host "Building Docker harness image..." -ForegroundColor Cyan
          docker build -f tests/Dockerfile.publish-test -t specrew-publish-test .

          if ($LASTEXITCODE -ne 0) {
            Write-Host "Docker build FAILED. Blocking publication." -ForegroundColor Red
            exit 1
          }

          Write-Host "Running pre-publish validation harness..." -ForegroundColor Cyan
          docker run --rm specrew-publish-test

          if ($LASTEXITCODE -ne 0) {
            Write-Host "Pre-publish validation FAILED. Blocking publication." -ForegroundColor Red
            Write-Host "Review the validation output above for details." -ForegroundColor Yellow
            exit 1
          }

          Write-Host "Pre-publish validation PASSED. Proceeding to publication." -ForegroundColor Green

  publish-module:
    needs: prepublish-validation
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release context
        id: release_context
        shell: pwsh
        run: |
          $eventName = '${{ github.event_name }}'
          $dispatchMode = '${{ inputs.release_mode }}'
          $dispatchTag = '${{ inputs.release_tag }}'
          $effectiveMode = 'dry-run'
          $effectiveRefType = '${{ github.ref_type }}'
          $effectiveRefName = '${{ github.ref_name }}'
          $requestedDispatchTag = if ([string]::IsNullOrWhiteSpace($dispatchTag)) { '' } else { $dispatchTag.Trim() }

          if ($eventName -eq 'push' -and $effectiveRefType -eq 'tag') {
            $effectiveMode = if ($effectiveRefName -match '^v\d+\.\d+\.\d+-') {
              'publish-prerelease'
            }
            else {
              'publish-stable'
            }
          }
          elseif ($eventName -eq 'workflow_dispatch') {
            $effectiveMode = if ([string]::IsNullOrWhiteSpace($dispatchMode)) {
              'dry-run'
            }
            else {
              $dispatchMode
            }

            if (-not [string]::IsNullOrWhiteSpace($requestedDispatchTag)) {
              $effectiveRefType = 'tag'
              $effectiveRefName = $requestedDispatchTag
            }
            elseif ($effectiveMode -ne 'dry-run') {
              throw "workflow_dispatch mode '$effectiveMode' requires inputs.release_tag."
            }
            else {
              $effectiveRefType = ''
              $effectiveRefName = ''
            }
          }

          $createGithubRelease = (
            $effectiveRefType -eq 'tag' -and
            $effectiveMode -in @('publish-prerelease', 'publish-stable', 'promote-prerelease')
          )
          $ensureDispatchTag = (
            $eventName -eq 'workflow_dispatch' -and
            $effectiveRefType -eq 'tag' -and
            $effectiveMode -in @('publish-prerelease', 'publish-stable', 'promote-prerelease')
          )
          $releaseFlag = switch ($effectiveMode) {
            'publish-prerelease' { '--prerelease' }
            'publish-stable' { '--latest' }
            'promote-prerelease' { '--latest' }
            default { '' }
          }

          "release_mode=$effectiveMode" >> $env:GITHUB_OUTPUT
          "release_ref_type=$effectiveRefType" >> $env:GITHUB_OUTPUT
          "release_ref_name=$effectiveRefName" >> $env:GITHUB_OUTPUT
          "create_github_release=$createGithubRelease" >> $env:GITHUB_OUTPUT
          "ensure_dispatch_tag=$ensureDispatchTag" >> $env:GITHUB_OUTPUT
          "release_flag=$releaseFlag" >> $env:GITHUB_OUTPUT
          Write-Host "Release mode: $effectiveMode"
          Write-Host "Event: $eventName"
          Write-Host "Ref type: $effectiveRefType"
          Write-Host "Ref name: $effectiveRefName"
          Write-Host "Create GitHub release: $createGithubRelease"
          Write-Host "Ensure dispatch tag: $ensureDispatchTag"
          Write-Host "Release flag: $(if ([string]::IsNullOrWhiteSpace($releaseFlag)) { '(none)' } else { $releaseFlag })"
          if ($eventName -eq 'workflow_dispatch') {
            Write-Host "workflow_dispatch release_tag input: $dispatchTag"
            Write-Host "workflow_dispatch resolved tag input: $requestedDispatchTag"
          }

      - name: Ensure dispatch tag exists at expected SHA
        if: steps.release_context.outputs.ensure_dispatch_tag == 'true'
        shell: pwsh
        run: |
          $tag = '${{ steps.release_context.outputs.release_ref_name }}'
          $expectedSha = (git rev-parse HEAD).Trim()

          git fetch --force --tags origin
          $existingTag = (git tag --list $tag | Select-Object -First 1)
          if ([string]::IsNullOrWhiteSpace($existingTag)) {
            git tag $tag $expectedSha
            git push origin "refs/tags/$tag"
            Write-Host "Created lightweight tag '$tag' at $expectedSha and pushed it to origin."
            exit 0
          }

          $existingSha = (git rev-list -n 1 $tag).Trim()
          if ($existingSha -ne $expectedSha) {
            throw "Dispatch tag '$tag' already exists at $existingSha, but this workflow run expects $expectedSha. Refusing to publish divergent content."
          }

          Write-Host "Dispatch tag '$tag' already exists at expected SHA $expectedSha."

      - name: Stamp and publish
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          .\scripts\internal\invoke-module-release.ps1 `
            -RepositoryRoot (Get-Location).Path `
            -ReleaseMode '${{ steps.release_context.outputs.release_mode }}' `
            -GitRefType '${{ steps.release_context.outputs.release_ref_type }}' `
            -GitRefName '${{ steps.release_context.outputs.release_ref_name }}' `
            -SummaryPath $env:GITHUB_STEP_SUMMARY

      - name: Build release artifact (module zip)
        if: steps.release_context.outputs.create_github_release == 'true'
        id: build_artifact
        shell: pwsh
        run: |
          # Bundle the module files into a zip artifact suitable for download
          # from the GitHub Release page. Includes everything PSGallery would
          # ship per the manifest FileList, plus repo-level reference files
          # for offline evaluation (LICENSE, NOTICE.md, README.md, CHANGELOG.md, docs/).
          $version = '${{ steps.release_context.outputs.release_ref_name }}' -replace '^v', ''
          $zipPath = (Join-Path (Get-Location).Path "specrew-$version.zip")

          # Use the FileList from the manifest as the canonical module-surface list
          $manifest = Import-PowerShellDataFile -Path './Specrew.psd1'
          $manifestFiles = $manifest.FileList

          # Stage everything in a clean directory, then zip
          $stagingDir = Join-Path $env:RUNNER_TEMP "specrew-$version-staging"
          if (Test-Path $stagingDir) { Remove-Item -Recurse -Force $stagingDir }
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          # Copy each FileList entry preserving its directory structure
          foreach ($file in $manifestFiles) {
            $src = Join-Path '.' $file
            if (-not (Test-Path $src)) {
              Write-Warning "FileList entry missing: $file"
              continue
            }
            $relDir = Split-Path $file -Parent
            $destDir = if ([string]::IsNullOrEmpty($relDir)) { $stagingDir } else { Join-Path $stagingDir $relDir }
            if (-not (Test-Path $destDir)) {
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
            }
            Copy-Item -LiteralPath $src -Destination (Join-Path $stagingDir $file) -Force
          }

          # Also include repo-level reference files relevant for offline evaluation
          foreach ($extra in @('LICENSE', 'NOTICE.md', 'README.md', 'CHANGELOG.md')) {
            if (Test-Path $extra) {
              Copy-Item -LiteralPath $extra -Destination (Join-Path $stagingDir $extra) -Force
            }
          }

          # Include docs/ recursively (small, useful for offline reading)
          if (Test-Path './docs') {
            Copy-Item -LiteralPath './docs' -Destination (Join-Path $stagingDir 'docs') -Recurse -Force
          }

          # Build the zip
          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipPath -Force

          Write-Host "Built release artifact: $zipPath"
          Write-Host "Size: $((Get-Item $zipPath).Length) bytes"

          "release_zip=$zipPath" >> $env:GITHUB_OUTPUT
          "release_version=$version" >> $env:GITHUB_OUTPUT

      - name: Extract changelog entry for release notes
        if: steps.release_context.outputs.create_github_release == 'true'
        id: extract_changelog
        shell: pwsh
        run: |
          # Extract this version's CHANGELOG entry as release notes.
          # Convention: a section starting with `## [v0.19.0]` or `## v0.19.0` or
          # `## 0.19.0`, ending at the next `## ` or end of file.
          $version = '${{ steps.release_context.outputs.release_ref_name }}' -replace '^v', ''
          $changelogPath = './CHANGELOG.md'

          if (-not (Test-Path $changelogPath)) {
            Write-Warning "CHANGELOG.md not found; release notes will be auto-generated by gh."
            "notes_path=" >> $env:GITHUB_OUTPUT
            return
          }

          $content = Get-Content -LiteralPath $changelogPath -Raw -Encoding UTF8
          $escapedVersion = [regex]::Escape($version)
          # Match `## [v0.19.0]` or `## v0.19.0` or `## 0.19.0` style headers
          $pattern = "(?ms)^## \[?v?$escapedVersion\]?[^\n]*\r?\n(.*?)(?=^## |\z)"
          $match = [regex]::Match($content, $pattern)

          if ($match.Success) {
            $notesBody = $match.Groups[1].Value.Trim()
            $notesPath = Join-Path $env:RUNNER_TEMP "release-notes-$version.md"
            $notesBody | Set-Content -LiteralPath $notesPath -Encoding UTF8 -NoNewline
            Write-Host "Extracted CHANGELOG entry for v$version ($($notesBody.Length) chars)"
            "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "No CHANGELOG.md section found for v$version; gh will auto-generate notes."
            "notes_path=" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release with module zip attached
        if: steps.release_context.outputs.create_github_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = '${{ steps.release_context.outputs.release_ref_name }}'
          $zipPath = '${{ steps.build_artifact.outputs.release_zip }}'
          $notesPath = '${{ steps.extract_changelog.outputs.notes_path }}'
          $releaseFlag = '${{ steps.release_context.outputs.release_flag }}'

          # A promote-prerelease run reuses an EXISTING prerelease tag whose GitHub release
          # already exists, so `gh release create` errors ("a release with the same tag name
          # already exists") AFTER the PSGallery publish has already succeeded — a false failure.
          # Make this idempotent: if the release exists, (re)attach the artifact and refresh
          # notes/flags (on a promote, mark it latest + non-prerelease); otherwise create it fresh.
          gh release view $tag *> $null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $global:LASTEXITCODE = 0

          if ($releaseExists) {
            Write-Host "GitHub release '$tag' already exists - updating it (artifact + notes/flags), not re-creating."
            gh release upload $tag $zipPath --clobber
            $editArgs = @('release', 'edit', $tag)
            if ($notesPath -and (Test-Path $notesPath)) { $editArgs += @('--notes-file', $notesPath) }
            if ($releaseFlag -eq '--latest') { $editArgs += @('--latest', '--prerelease=false') }
            gh @editArgs
          } else {
            $ghArgs = @('release', 'create', $tag, '--title', "Specrew $tag")
            if (-not [string]::IsNullOrWhiteSpace($releaseFlag)) { $ghArgs += $releaseFlag }
            if ($notesPath -and (Test-Path $notesPath)) { $ghArgs += @('--notes-file', $notesPath) } else { $ghArgs += @('--generate-notes') }
            $ghArgs += $zipPath
            Write-Host "Creating GitHub Release for $tag with artifact $zipPath"
            gh @ghArgs
          }

          Write-Host "Release page: https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$tag"
