# Secrets required for publishing (T042 human-owned follow-up):
#   - PSGALLERY_API_KEY
#   - SIGNING_CERT_BASE64
#   - SIGNING_CERT_PASSWORD
#
# Iteration 002 enablement:
#   - v*.* tag push now defaults to 'publish' mode (automatic publishing)
#   - if secrets are not configured, workflow fails with clear error message
#   - manual dispatch remains available for dry-run testing before secrets exist
name: Publish Specrew module

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'dry-run validates stamp/sign/publish without a live release; publish performs a real PSGallery publish'
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read

jobs:
  publish-module:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release mode
        id: release_mode
        shell: pwsh
        run: |
          # Default to 'publish' for tag pushes (automatic publishing)
          # Default to 'dry-run' for manual dispatch unless explicitly set to 'publish'
          $mode = if ('${{ github.event_name }}' -eq 'push') {
            'publish'
          } elseif ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.release_mode }}'
          } else {
            'dry-run'
          }

          if ([string]::IsNullOrWhiteSpace($mode)) {
            $mode = 'dry-run'
          }

          "release_mode=$mode" >> $env:GITHUB_OUTPUT
          Write-Host "Release mode: $mode"
          Write-Host "Event: ${{ github.event_name }}"
          Write-Host "Ref: ${{ github.ref }}"

      - name: Stamp, sign, and publish
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          .\scripts\internal\invoke-module-release.ps1 `
            -RepositoryRoot (Get-Location).Path `
            -ReleaseMode '${{ steps.release_mode.outputs.release_mode }}' `
            -GitRefType '${{ github.ref_type }}' `
            -GitRefName '${{ github.ref_name }}' `
            -AllowEphemeralSigningCertificate `
            -SummaryPath $env:GITHUB_STEP_SUMMARY
