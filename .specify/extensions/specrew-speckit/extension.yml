schema_version: "1.0"
schema: "v1"

extension:
  id: specrew-speckit
  name: "Specrew Spec Kit Extension"
  version: "0.25.0"
  description: "Spec Kit extension providing governance artifacts, templates, and validation for Specrew"

requires:
  speckit_version: ">=0.8.4"

provides:
  commands:
    - name: speckit.specrew-speckit.before-plan
      file: commands/speckit.specrew-speckit.before-plan.md
      description: "Validate requirement readiness before planning"
    - name: speckit.specrew-speckit.after-tasks
      file: commands/speckit.specrew-speckit.after-tasks.md
      description: "Verify task-to-requirement traceability after task generation"
    - name: speckit.specrew-speckit.before-implement
      file: commands/speckit.specrew-speckit.before-implement.md
      description: "Validate execution readiness before implementation"
    - name: speckit.specrew-speckit.sync-specify
      file: commands/speckit.specrew-speckit.sync-specify.md
      description: "Persist session-state metadata after specification"
    - name: speckit.specrew-speckit.sync-clarify
      file: commands/speckit.specrew-speckit.sync-clarify.md
      description: "Persist session-state metadata after clarification"
    - name: speckit.specrew-speckit.sync-plan
      file: commands/speckit.specrew-speckit.sync-plan.md
      description: "Persist session-state metadata after planning"
    - name: speckit.specrew-speckit.sync-tasks
      file: commands/speckit.specrew-speckit.sync-tasks.md
      description: "Persist session-state metadata after task generation"
    - name: speckit.specrew-speckit.sync-review-signoff
      file: commands/speckit.specrew-speckit.sync-review-signoff.md
      description: "Persist session-state metadata after review-signoff (Proposal 090)"
    - name: speckit.specrew-speckit.sync-retro
      file: commands/speckit.specrew-speckit.sync-retro.md
      description: "Persist session-state metadata after retro (Proposal 090)"
    - name: speckit.specrew-speckit.sync-iteration-closeout
      file: commands/speckit.specrew-speckit.sync-iteration-closeout.md
      description: "Persist session-state metadata after iteration-closeout (Proposal 090)"
    - name: speckit.specrew-speckit.sync-feature-closeout
      file: commands/speckit.specrew-speckit.sync-feature-closeout.md
      description: "Persist session-state metadata after feature-closeout (Proposal 090)"

hooks:
  before_plan:
    command: speckit.specrew-speckit.before-plan
    optional: false
    description: "Validate spec readiness before planning"
  after_tasks:
    command: speckit.specrew-speckit.after-tasks
    optional: false
    description: "Verify task traceability after task generation"
  before_implement:
    command: speckit.specrew-speckit.before-implement
    optional: false
    description: "Validate execution readiness before implementation"

tags:
  - governance
  - specrew
  - squad-native

config:
  defaults:
    governance_mode: "standard"
    drift_detection:
      enabled: true
      mode: "batch"
    capacity:
      default_unit: "story_points"
      default_per_iteration: 20
      overcommit_threshold: 1.0
    traceability:
      require_fr_mapping: true
      require_us_mapping: true
      orphan_tasks_allowed: false
    versions:
      min_speckit: "0.8.4"
      min_squad: "0.9.1"
